<!DOCTYPE html>
<html>
<head>
  <title>Engineer Status Dashboard</title>
  <style>
    body { font-family: Arial; padding: 25px; background: #f5f7fa; }
    h2 { color: #1f2937; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background: #111827; color: white; }
    .Available { color: green; font-weight: bold; }
    .Busy { color: orange; font-weight: bold; }
    .P1 { color: red; font-weight: bold; }
    .Leave, .Week, .Not, .Out { color: gray; font-weight: bold; }
  </style>
</head>
<body>

<h2>Engineer Availability Dashboard</h2>
<p>Live status updated by support team.</p>

<table>
  <thead>
    <tr>
      <th>Engineer</th>
      <th>Status</th>
      <th>Shift</th>
      <th>Last Updated</th>
      <th>Remarks</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQain7Gs1YgKVEaYG7SNp9h5MvkRKwwcywsB50vH2vyBCSF9cM3jiGAQzz3Zohnlsm2bZJZO28qaRQw/pub?output=csv";

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && insideQuotes && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

fetch(sheetUrl)
  .then(response => response.text())
  .then(data => {
    const rows = parseCSV(data).slice(1);
    let html = "";

    rows.forEach(cols => {
      if (cols.length >= 3 && cols[0].trim() !== "") {
        const status = cols[1].trim();
        html += `
          <tr>
            <td>${cols[0]}</td>
            <td class="${status.split(' ')[0]}">${status}</td>
            <td>${cols[2] || ""}</td>
            <td>${cols[3] || ""}</td>
            <td>${cols[4] || ""}</td>
          </tr>
        `;
      }
    });

    document.getElementById("tableBody").innerHTML = html;
  });
</script>

</body>
</html>
